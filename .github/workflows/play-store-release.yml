name: Play Store Release

on:
  push:
    paths:
      - 'pubspec.yaml'
      - '.github/workflows/play-store-release.yml'
    branches:
      - main
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track (internal, alpha, beta, production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d' ' -f2)
          echo "Full version: $VERSION"

          # Parse version and build number
          if [[ $VERSION == *"+"* ]]; then
            VERSION_NAME="${VERSION%+*}"
            BUILD_NUMBER="${VERSION##*+}"
          else
            VERSION_NAME="$VERSION"
            BUILD_NUMBER="1"
          fi

          TAG="v${VERSION_NAME}+${BUILD_NUMBER}"

          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Check if tag exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists, skipping release"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "New version detected: $TAG"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore from base64
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks
          ls -lh release.jks

      - name: Build AAB
        run: |
          flutter build appbundle \
            --release \
            --target-platform=android-arm64 \
            --build-number=${{ needs.check-version.outputs.build }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.godslove.democracy_simulator
          releaseFiles: 'build/app/outputs/bundle/release/*.aab'
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: whatsnew
          changelogStartIndex: 0

      - name: Create Git tag
        if: needs.check-version.outputs.should_release == 'true'
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@godslove.com"
          git tag -a ${{ needs.check-version.outputs.tag }} -m "Release ${{ needs.check-version.outputs.tag }}"
          git push origin ${{ needs.check-version.outputs.tag }}

      - name: Create GitHub Release
        if: needs.check-version.outputs.should_release == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          release_name: Release ${{ needs.check-version.outputs.tag }}
          body: |
            **Version**: ${{ needs.check-version.outputs.version }}
            **Build**: ${{ needs.check-version.outputs.build }}
            **Track**: ${{ github.event.inputs.track || 'internal' }}

            Automatically built and deployed to Google Play Store.
          draft: false
          prerelease: ${{ github.event.inputs.track != 'production' }}
